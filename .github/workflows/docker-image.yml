name: Publish Docker Image on merge

on:
  pull_request:
    types: [ closed ]

jobs:
  build:
    if: github.event.pull_request.merged == true
    name: Build snd Push Docker Image to DockerHub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read version from file
        id: get_version
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          tags: audiocomp/snmptrapd-influxdb-exporter:latest

      - name: Build and push Docker image with version tag
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          sbom: true
          provenance: mode=max
          tags: audiocomp/snmptrapd-influxdb-exporter:${{ env.VERSION }}

      - name: Update repo description
        uses: peter-evans/dockerhub-description@e98e4d1628a5f3be2be7c231e50981aee98723ae # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: audiocomp/snmptrapd-influxdb-exporter
